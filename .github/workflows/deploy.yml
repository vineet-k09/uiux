name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main  # Trigger on push to main branch

env:
  PROJECT_ID: 'YOUR_GCP_PROJECT_ID'           # TODO: Replace with your GCP project ID
  GAR_LOCATION: 'us-central1'                # TODO: Replace with your Artifact Registry region
  REPOSITORY: 'my-nextjs-app'                # TODO: Replace with your Artifact Registry repository name
  SERVICE: 'nextjs-frontend'                 # TODO: Replace with your Cloud Run service name
  REGION: 'us-central1'                      # TODO: Replace with your Cloud Run service region

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- OPTION A: AUTH WITH WORKLOAD IDENTITY FEDERATION (Recommended) --
      # Setup Workload Identity Federation: https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation
      - name: Google Auth (Workload Identity)
        id: auth-wif
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider' # TODO: Replace with your provider
          service_account: 'my-service-account@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com' # TODO: Replace with your service account
          # If using service account key JSON instead (not recommended but simple), comment out Option A and use Option B below.

      # -- OPTION B: AUTH WITH SERVICE ACCOUNT KEY (Alternative) --
      # - name: Google Auth (Service Account Key)
      #   id: auth-sa
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Authenticate Docker to Google Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: _json_key
          password: ${{ steps.auth-wif.outputs.credentials_json || secrets.GCP_SA_KEY }} # Automatically uses whichever auth method you chose

      # Build the Docker image and push to Artifact Registry
      - name: Build and Push Container
        run: |
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Deploy the image to Google Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}

      # Output the URL of the deployed Cloud Run service
      - name: Show URL
        run: echo "Deployed successfully! Service URL is ${{ steps.deploy.outputs.url }}"
